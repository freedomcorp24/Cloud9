{% extends "oscar/layout.html" %}
{% load static %}

{% block title %}
Edit Vendor Profile | {{ block.super }}
{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="row">
        <div class="col-md-8">
            <h1>Edit Vendor Profile</h1>
            
            <form method="post" class="form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'marketplace:vendor_profile' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
