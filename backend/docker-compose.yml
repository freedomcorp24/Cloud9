version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Cloud 9
      - MAIN_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/cloud9_main
      - PAYMENT_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-payments:5432/cloud9_payments
      - ANALYTICS_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-analytics:5432/cloud9_analytics
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=test-secret-key
    depends_on:
      - postgres
      - postgres-payments
      - postgres-analytics
      - elasticsearch
      - redis

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cloud9_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-payments:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cloud9_payments
    ports:
      - "5433:5432"
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data

  postgres-analytics:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cloud9_analytics
    ports:
      - "5434:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  postgres_payments_data:
  postgres_analytics_data:
  elasticsearch_data:
  redis_data:
