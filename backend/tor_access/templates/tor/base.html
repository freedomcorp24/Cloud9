<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Cloud 9 Marketplace{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Basic styling without JavaScript dependencies */
        body { 
            font-family: monospace;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .product-grid {
            display: block;
            margin: 20px 0;
        }
        .product-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            background: #fff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .alert {
            padding: 15px;
            margin: 15px 0;
            border: 1px solid transparent;
        }
        .alert-success { background-color: #d4edda; }
        .alert-error { background-color: #f8d7da; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cloud 9 Marketplace</h1>
            <nav>
                <form method="get" action="{% url 'search' %}">
                    <input type="text" name="q" placeholder="Search products...">
                    <button type="submit">Search</button>
                </form>
                {% if user.is_authenticated %}
                    <a href="{% url 'account' %}">Account</a>
                    <a href="{% url 'orders' %}">Orders</a>
                    <a href="{% url 'wallet' %}">Wallet</a>
                    <form method="post" action="{% url 'logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </nav>
        </header>

        <main>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2025 Cloud 9 Marketplace. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
